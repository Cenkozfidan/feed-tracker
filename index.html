<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#e8a020">
<link rel="manifest" href="manifest.json">
<title>Birsen – Feed Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0d1017;--bg2:#13161c;--bg3:#1a1f2b;
    --border:#2a2f3a;--gold:#e8a020;--goldl:#e8a02022;
    --text:#e2e8f0;--muted:#718096;--dim:#4a5568;
    --green:#48bb78;--red:#fc8181;--blue:#63b3ed;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;overflow:hidden}
  #app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ── TOP BAR ── */
  #topbar{
    background:var(--bg2);border-bottom:1px solid var(--border);
    padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
    flex-shrink:0;
  }
  .logo{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
  .logo span{display:block;font-size:9px;letter-spacing:1px;color:var(--muted);font-weight:400;margin-top:1px}
  .fetch-all-btn{
    background:var(--gold);color:#0d1017;border:none;border-radius:6px;
    padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;
    letter-spacing:.3px;white-space:nowrap;
  }
  .fetch-all-btn:disabled{background:var(--bg3);color:var(--dim);cursor:not-allowed}

  /* ── TABS ── */
  #tabs{
    display:flex;background:var(--bg2);border-bottom:1px solid var(--border);
    flex-shrink:0;overflow-x:auto;scrollbar-width:none;
  }
  #tabs::-webkit-scrollbar{display:none}
  .tab{
    flex-shrink:0;padding:10px 16px;font-size:12px;font-weight:600;
    color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;
    white-space:nowrap;transition:color .15s,border-color .15s;
  }
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}

  /* ── CONTENT ── */
  #content{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;-webkit-overflow-scrolling:touch}

  /* ── CARDS ── */
  .card{
    background:var(--bg2);border:1px solid var(--border);border-radius:10px;
    padding:14px 15px;margin-bottom:10px;transition:border-color .2s;
  }
  .card.expanded{border-color:var(--gold)44}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .card-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.3}
  .card-cat{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
  .badge{
    font-size:10px;font-family:monospace;letter-spacing:.5px;
    border-radius:3px;padding:2px 7px;border:1px solid;white-space:nowrap;
  }
  .badge-idle{background:#4a556822;color:var(--dim);border-color:#4a556844}
  .badge-loading{background:#d4a01722;color:#d4a017;border-color:#d4a01744;animation:pulse 1s infinite}
  .badge-done{background:#48bb7822;color:var(--green);border-color:#48bb7844}
  .badge-error{background:#fc818122;color:var(--red);border-color:#fc818144}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

  .price-val{font-family:monospace;font-size:20px;font-weight:800;color:var(--gold);margin-top:8px;letter-spacing:-.5px}
  .price-trend{font-size:11px;color:var(--muted);margin-top:3px}
  .price-summary{
    font-size:11px;color:#94a3b8;line-height:1.6;
    background:var(--bg);border:1px solid var(--bg3);border-radius:6px;
    padding:9px 11px;margin-top:8px;
  }
  .price-ts{font-size:10px;color:var(--dim);font-family:monospace;margin-top:6px}

  .card-actions{display:flex;gap:7px;margin-top:10px}
  .btn-fetch{
    flex:1;padding:8px;border-radius:6px;border:none;
    background:var(--gold);color:#0d1017;font-weight:800;font-size:11px;
    cursor:pointer;letter-spacing:.3px;
  }
  .btn-fetch:disabled{background:var(--bg3);color:var(--dim);cursor:not-allowed}
  .btn-link{
    padding:8px 11px;border-radius:6px;font-size:11px;font-weight:600;
    background:var(--bg3);color:var(--muted);border:1px solid var(--border);
    text-decoration:none;display:flex;align-items:center;
  }

  /* ── REPORT ── */
  .report-card{
    background:var(--bg2);border:1px solid var(--border);border-radius:10px;
    margin-bottom:10px;overflow:hidden;
  }
  .report-header{
    padding:14px 15px;display:flex;justify-content:space-between;
    align-items:center;cursor:pointer;
  }
  .report-header:active{background:var(--bg3)}
  .report-date{font-size:13px;font-weight:700;color:var(--text)}
  .report-meta{font-size:10px;color:var(--muted);margin-top:2px}
  .report-body{
    padding:0 15px 15px;border-top:1px solid var(--border);
    font-size:12px;line-height:1.7;color:#94a3b8;
    white-space:pre-wrap;
  }
  .report-body h3{color:var(--gold);font-size:12px;margin:12px 0 4px;letter-spacing:.5px;text-transform:uppercase}
  .report-body .item{
    background:var(--bg);border-left:2px solid var(--border);
    border-radius:0 5px 5px 0;padding:7px 10px;margin-bottom:6px;
  }
  .report-body .item .name{color:var(--text);font-weight:700;font-size:12px}
  .report-body .item .price{color:var(--gold);font-family:monospace;font-size:13px}
  .report-body .item .trend{color:var(--muted);font-size:11px;margin-top:2px}

  /* ── NEWS ── */
  .news-item{
    background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--gold);
    border-radius:0 8px 8px 0;padding:12px 13px;margin-bottom:10px;
  }
  .news-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.4}
  .news-sum{font-size:11px;color:#94a3b8;margin-top:5px;line-height:1.5}
  .news-rel{
    display:inline-block;margin-top:7px;font-size:10px;color:var(--gold);
    background:var(--goldl);border:1px solid #e8a02033;border-radius:3px;padding:2px 8px;
  }
  .news-date{font-size:10px;color:var(--dim);font-family:monospace;margin-top:4px}

  /* ── LINKS ── */
  .link-card{
    background:var(--bg2);border:1px solid var(--border);border-radius:8px;
    padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;
    align-items:center;text-decoration:none;
  }
  .link-card:active{background:var(--bg3)}
  .link-name{font-size:13px;font-weight:700;color:var(--gold)}
  .link-desc{font-size:11px;color:var(--muted);margin-top:2px}
  .link-arrow{color:var(--dim);font-size:16px}

  /* ── SECTION HEADER ── */
  .section-hdr{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:10px;
  }
  .section-title{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
  .btn-sm{
    padding:6px 12px;border-radius:6px;border:1px solid var(--gold)44;
    background:transparent;color:var(--gold);font-size:11px;font-weight:700;
    cursor:pointer;letter-spacing:.3px;
  }
  .btn-sm:disabled{color:var(--dim);border-color:var(--dim)33;cursor:not-allowed}

  /* ── SCHEDULE BANNER ── */
  .schedule-banner{
    background:var(--bg2);border:1px solid var(--border);border-radius:8px;
    padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;
  }
  .schedule-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite}
  .schedule-txt{font-size:11px;color:var(--muted)}
  .schedule-txt strong{color:var(--text)}

  /* ── EMPTY ── */
  .empty{text-align:center;padding:36px 20px;color:var(--dim);font-size:12px}
  .empty-icon{font-size:32px;margin-bottom:10px}

  /* ── CATEGORY PILL ── */
  .cat-pills{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
  .cat-pills::-webkit-scrollbar{display:none}
  .cat-pill{
    flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);
    background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;
  }
  .cat-pill.active{background:var(--goldl);border-color:var(--gold)66;color:var(--gold)}

  .chevron{transition:transform .2s;display:inline-block;color:var(--dim);font-size:12px}
  .chevron.open{transform:rotate(180deg)}

  .toast{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#0d1017;padding:10px 20px;border-radius:8px;
    font-size:12px;font-weight:700;z-index:999;
    animation:fadeout 3s forwards;
  }
  @keyframes fadeout{0%,70%{opacity:1}100%{opacity:0;pointer-events:none}}
</style>
</head>

  'Other':       'https://www.mobaobuy.com/siyibuy/indexPage',

const LINKS = [
  {name:'mobaobuy.com',  url:'https://www.mobaobuy.com',           desc:'China feed raw material market'},
  {name:'TÜYEKAD',       url:'https://tuyekad.org.tr/',            desc:'TR Feed Additives Association'},

  {name:'Xeneta', url:'https://www.xeneta.com/', desc:'Ocean freight benchmarking'},
  {name:'Sulfur Price', url:'https://www.chemanalyst.com/Pricing-data/sulphur-35', desc:'Sulfur market prices'},
  {name:'Effamall', url:'https://www.effamall.com/article', desc:'Daily feed additive market reports'},

  {name:'Vega Daily Report', url:'https://www.vegapharma.com/index/china/index.html', desc:'Vega Group daily vitamin & amino acid market news'},
  {name:'Vega LinkedIn', url:'https://www.linkedin.com/company/vega-pharma-limited/posts/?feedView=all', desc:'Vega Group LinkedIn posts'},
  {name:'Vegamax LinkedIn', url:'https://www.linkedin.com/company/vegamax', desc:'Vegamax daily feed additive reports'},
  {name:'NHU LinkedIn', url:'https://www.linkedin.com/company/zhejiang-nhu-co-ltd/', desc:'NHU vitamins manufacturer'},
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let activeTab = 'prices';
let activeCat = 'All';
let expandedCards = {};
let expandedReports = {};
let priceData = {};
let reports = [];
let newsData = [];
let newsStatus = 'idle';
let fetchingAll = false;
let fetchingNews = false;

function save() {
  try {
    localStorage.setItem('ft_prices', JSON.stringify(priceData));
    localStorage.setItem('ft_reports', JSON.stringify(reports));
    localStorage.setItem('ft_news', JSON.stringify(newsData));
    localStorage.setItem('ft_lastFetch', new Date().toISOString());
  } catch(e) {}
}

function load() {
  try {
    priceData  = JSON.parse(localStorage.getItem('ft_prices') || '{}');
    reports    = JSON.parse(localStorage.getItem('ft_reports') || '[]');
    newsData   = JSON.parse(localStorage.getItem('ft_news') || '[]');
  } catch(e) {
    priceData = {}; reports = []; newsData = [];
  }
}

// ══════════════════════════════════════════
// API
// ══════════════════════════════════════════
async function callClaude(prompt, useSearch=true) {
  const body = {
    model: 'claude-sonnet-4-6',
    max_tokens: 1000,
    messages: [{role:'user', content: prompt}]
  };
  if (useSearch) body.tools = [{type:'web_search_20250305', name:'web_search'}];

  const r = await fetch('/.netlify/functions/claude', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const d = await r.json();
  return d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

function parseJSON(text) {
  try {
    return JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch { return null; }
}

async function fetchPrice(product) {
  priceData[product.id] = {...(priceData[product.id]||{}), status:'loading'};
  render();

  try {
    const text = await callClaude(
      `You are a commodity analyst. Search for the current market price of ${product.name} (feed grade) exported from China.
Query hint: ${product.q}
Focus ONLY on prices from the last 7 days (June 2026). Do NOT use old data.
Return ONLY a JSON object (no other text):
{"price":"current range like $X.XX/kg or $XXX-$XXX/MT","trend":"one sentence on recent price direction","summary":"2-3 sentences on current market, be specific about June 2026 prices"}`
    );
    const p = parseJSON(text);
    priceData[product.id] = {
      status:'done',
      price: p?.price || '—',
      trend: p?.trend || '',
      summary: p?.summary || text.slice(0,250),
      ts: new Date().toLocaleString('en-GB',{dateStyle:'short',timeStyle:'short'})
    };
  } catch(e) {
    priceData[product.id] = {status:'error', summary:'Fetch failed. Check connection.'};
  }
  save();
  render();
}

async function fetchAll() {
  if (fetchingAll) return;
  fetchingAll = true;
  document.getElementById('fetchAllBtn').disabled = true;
  document.getElementById('fetchAllBtn').textContent = '⏳ Fetching...';
  render();

  for (const p of PRODUCTS) {
    await fetchPrice(p);
  }
  // After fetching all, generate daily report
  await generateReport();

  fetchingAll = false;
  document.getElementById('fetchAllBtn').disabled = false;
  document.getElementById('fetchAllBtn').textContent = '⚡ Fetch All';
  showToast('✅ All prices updated + report ready!');
  render();
}

async function generateReport() {
  const snapshot = PRODUCTS.map(p => {
    const d = priceData[p.id];
    return `${p.name}: ${d?.price || 'N/A'} — ${d?.trend || ''} — ${d?.summary || ''}`;
  }).join('\n');

  try {
    const text = await callClaude(
      `You are a market analyst for a Turkish feed additive manufacturer (Birsen Kimya).
Based on these current prices and trends, write a concise daily report in English.
Focus on: key price movements, risks, buying opportunities, and 2-3 actionable recommendations.

Data:
${snapshot}

Return ONLY a JSON object:
{
  "headline": "one sentence summary of today's market",
  "highlights": [{"product":"name","signal":"BUY/HOLD/WATCH","note":"1 sentence"}],
  "risks": "2 sentences on biggest risks",
  "opportunities": "2 sentences on best opportunities",
  "recommendation": "2-3 sentences actionable advice for procurement"
}`, false
    );
    const rep = parseJSON(text);
    if (rep) {
      reports.unshift({
        date: new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'}),
        time: new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
        ...rep,
        priceSnapshot: PRODUCTS.map(p=>({
          name:p.name, cat:p.cat,
          price:priceData[p.id]?.price||'—',
          trend:priceData[p.id]?.trend||''
        }))
      });
      if (reports.length > 30) reports = reports.slice(0,30);
      save();
    }
  } catch(e) {}
}

async function fetchNews() {
  if (fetchingNews) return;
  fetchingNews = true;
  newsStatus = 'loading';
  render();

  try {
    const text = await callClaude(
      `You are a market analyst for a Turkish feed additive manufacturer importing vitamins, amino acids and minerals from China.

Search these sources and topics for June 2026 news:
- https://www.vegapharma.com/index/china/index.html (Vega Daily - daily vitamin & amino acid market report)
- https://www.effamall.com/article (Effamall daily feed market reports)
- Feed vitamin prices: Vitamin A, D3, E 50%, C, B-vitamins, K3 from China
- Amino acids: L-Lysine, L-Threonine, DL-Methionine prices
- Minerals: DCP, MCP, Choline Chloride, Ferrous Sulfate, Manganese Sulfate, Sulfur
- Container freight China to Turkey/Izmir (20ft, 40ft FCL rates)
- News from Vega Group, NHU, BASF, Adisseo about feed additive supply

Return ONLY valid JSON array, no markdown, no extra text:
[{"title":"short title","summary":"1-2 sentences with specific data","relevance":"products affected","date":"date"}]

Maximum 10 items. Start with [ and end with ]`
    );
    const arr = parseJSON(text);
    if (Array.isArray(arr)) { newsData = arr; newsStatus = 'done'; }
    else newsStatus = 'error';
  } catch { newsStatus = 'error'; }

  fetchingNews = false;
  save();
  render();
}

// ══════════════════════════════════════════
// SCHEDULER — checks every minute if it's 06:00 local time
// ══════════════════════════════════════════
function startScheduler() {
  setInterval(() => {
    const now = new Date();
    const lastFetch = localStorage.getItem('ft_lastFetch');
    const today = now.toDateString();
    const lastDay = lastFetch ? new Date(lastFetch).toDateString() : '';

    if (now.getHours() === 6 && now.getMinutes() === 0 && today !== lastDay) {
      fetchAll();
    }
  }, 60000);
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchTab(name, el) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render() {
  const c = document.getElementById('content');
  if (activeTab === 'prices') c.innerHTML = renderPrices();
  else if (activeTab === 'report') c.innerHTML = renderReports();
  else if (activeTab === 'news') c.innerHTML = renderNews();
  else c.innerHTML = renderLinks();
}

function badgeHTML(status) {
  const map = {idle:'idle',loading:'loading',done:'done',error:'error'};
  const labels = {idle:'—',loading:'Fetching…',done:'Updated',error:'Error'};
  const s = map[status||'idle'];
  return `<span class="badge badge-${s}">${labels[s]}</span>`;
}

const CATS = ['All','Vitamins','Amino Acids','Minerals','Other','Freight'];

function renderPrices() {
  const filtered = activeCat==='All' ? PRODUCTS : PRODUCTS.filter(p=>p.cat===activeCat);
  const now = new Date();
  const nextRun = new Date(now); nextRun.setHours(6,0,0,0);
  if (nextRun <= now) nextRun.setDate(nextRun.getDate()+1);
  const diff = nextRun - now;
  const hh = Math.floor(diff/3600000), mm = Math.floor((diff%3600000)/60000);

  const pills = CATS.map(c=>`<button class="cat-pill ${activeCat===c?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');

  const cards = filtered.map(p => {
    const d = priceData[p.id]||{};
    const exp = expandedCards[p.id];
    const mbLink = MOBAOBUY[p.cat]||MOBAOBUY['Other'];
    return `
    <div class="card ${exp?'expanded':''}" id="card-${p.id}">
      <div class="card-header" onclick="toggleCard('${p.id}')">
        <div>
          <div class="card-title">${p.name}</div>
          <div class="card-cat">${p.cat} · per ${p.unit}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${badgeHTML(d.status)}
          <span class="chevron ${exp?'open':''}">▾</span>
        </div>
      </div>
      ${d.price ? `<div class="price-val">${d.price}</div>` : ''}
      ${d.trend && exp ? `<div class="price-trend">↗ ${d.trend}</div>` : ''}
      ${d.summary && exp ? `<div class="price-summary">${d.summary}</div>` : ''}
      ${d.ts && exp ? `<div class="price-ts">Updated: ${d.ts}</div>` : ''}
      <div class="card-actions">
        <button class="btn-fetch" ${d.status==='loading'?'disabled':''} onclick="fetchOne('${p.id}')">
          ${d.status==='loading'?'Fetching…':'Fetch Price'}
        </button>
        <a class="btn-link" href="${mbLink}" target="_blank">MB ↗</a>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="schedule-banner">
      <div class="schedule-dot"></div>
      <div class="schedule-txt"><strong>Auto-fetch at 06:00</strong> · Next run in ${hh}h ${mm}m</div>
    </div>
    <div class="cat-pills">${pills}</div>
    ${cards}`;
}

function renderReports() {
  if (reports.length===0) return `
    <div class="empty">
      <div class="empty-icon">📊</div>
      <div>No reports yet.</div>
      <div style="margin-top:8px">Tap ⚡ Fetch All to generate your first report.</div>
    </div>`;

  return reports.map((r,i)=>{
    const exp = expandedReports[i];
    const sigMap = {'BUY':'var(--green)','HOLD':'var(--gold)','WATCH':'var(--blue)'};
    const highlights = (r.highlights||[]).map(h=>`
      <div class="item">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="name">${h.product}</div>
          <span style="font-size:10px;font-weight:800;color:${sigMap[h.signal]||'var(--muted)'};">${h.signal}</span>
        </div>
        <div class="trend" style="margin-top:3px">${h.note}</div>
      </div>`).join('');

    const snapshot = (r.priceSnapshot||[]).map(s=>`
      <div class="item">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="name">${s.name}</div>
          <div class="price">${s.price}</div>
        </div>
        ${s.trend?`<div class="trend">${s.trend}</div>`:''}
      </div>`).join('');

    return `
    <div class="report-card">
      <div class="report-header" onclick="toggleReport(${i})">
        <div>
          <div class="report-date">${r.date}</div>
          <div class="report-meta">${r.time} · ${(r.highlights||[]).length} signals</div>
        </div>
        <span class="chevron ${exp?'open':''}">▾</span>
      </div>
      ${exp ? `
      <div class="report-body">
        <div style="background:var(--goldl);border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--text);font-style:italic">${r.headline||''}</div>
        ${highlights?`<h3>🚦 Signals</h3>${highlights}`:''}
        ${r.risks?`<h3>⚠️ Risks</h3><div class="item"><div class="trend">${r.risks}</div></div>`:''}
        ${r.opportunities?`<h3>💡 Opportunities</h3><div class="item"><div class="trend">${r.opportunities}</div></div>`:''}
        ${r.recommendation?`<h3>✅ Recommendation</h3><div class="item"><div class="trend">${r.recommendation}</div></div>`:''}
        ${snapshot?`<h3>📋 Price Snapshot</h3>${snapshot}`:''}
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderNews() {
  return `
    <div class="section-hdr">
      <div class="section-title">Market News</div>
      <button class="btn-sm" ${fetchingNews?'disabled':''} onclick="fetchNews()">
        ${fetchingNews?'Searching…':'🔍 Search'}
      </button>
    </div>
    ${newsStatus==='idle' && newsData.length===0 ? `
      <div class="empty">
        <div class="empty-icon">📰</div>
        <div>Tap Search to fetch latest market news</div>
      </div>` : ''}
    ${newsStatus==='error' ? `<div style="color:var(--red);font-size:12px;padding:12px">Failed to fetch news. Check connection.</div>` : ''}
    ${newsData.map(n=>`
      <div class="news-item">
        <div class="news-title">${n.title}</div>
        <div class="news-sum">${n.summary}</div>
        ${n.relevance?`<div class="news-rel">${n.relevance}</div>`:''}
        ${n.date?`<div class="news-date">${n.date}</div>`:''}
      </div>`).join('')}`;
}

function renderLinks() {
  return `
    <div class="section-title" style="margin-bottom:12px">Industry Sources</div>
    ${LINKS.map(l=>`
      <a class="link-card" href="${l.url}" target="_blank">
        <div>
          <div class="link-name">${l.name}</div>
          <div class="link-desc">${l.desc}</div>
        </div>
        <div class="link-arrow">↗</div>
      </a>`).join('')}`;
}

// ══════════════════════════════════════════
// INTERACTION HELPERS
// ══════════════════════════════════════════
function toggleCard(id) {
  expandedCards[id] = !expandedCards[id];
  render();
}
function toggleReport(i) {
  expandedReports[i] = !expandedReports[i];
  render();
}
function setCat(c) {
  activeCat = c;
  render();
}
function fetchOne(id) {
  const p = PRODUCTS.find(x=>x.id===id);
  if (p) fetchPrice(p);
}

// ══════════════════════════════════════════
// SERVICE WORKER
// ══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
load();
startScheduler();
render();
</script>
</body>
</html>
